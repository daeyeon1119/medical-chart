<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chart">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Medical Chart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background-color: #f1f5f9;
    }
    /* iOS 입력 필드 zoom 방지 */
    input, textarea, select { font-size: 16px !important; }
    /* 스크롤바 깔끔하게 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// 간단한 SVG 아이콘들 (lucide-react 대체)
const Icon = ({ d, size = 16, className = '' }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={className}>{d}</svg>
);
const FileText = (p) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>} />;
const Save = (p) => <Icon {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
const FolderOpen = (p) => <Icon {...p} d={<path d="M6 14l1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/>} />;
const Copy = (p) => <Icon {...p} d={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />;
const Download = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
const Upload = (p) => <Icon {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>} />;
const Trash2 = (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />;
const Plus = (p) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
const X = (p) => <Icon {...p} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
const Check = (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12"/>} />;
const ChevronDown = (p) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />;
const ChevronRight = (p) => <Icon {...p} d={<polyline points="9 18 15 12 9 6"/>} />;
const FilePlus = (p) => <Icon {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></>} />;

// ROS 기본값 - 시스템별로 증상 항목 배열 (각각 +/- 체크 가능)
// status: '-' | '+' | null (null이면 출력에서 제외)
const DEFAULT_ROS = {
  General: ['fever', 'chill', 'weight loss', 'fatigue'],
  HEENT: ['headache', 'dizziness', 'visual change', 'hearing loss', 'sore throat'],
  Respiratory: ['cough', 'sputum', 'dyspnea', 'hemoptysis'],
  Cardiovascular: ['chest pain', 'palpitation', 'orthopnea', 'leg edema'],
  GI: ['abdominal pain', 'nausea', 'vomiting', 'diarrhea', 'constipation', 'melena', 'hematochezia'],
  GU: ['dysuria', 'frequency', 'urgency', 'hematuria'],
  Musculoskeletal: ['joint pain', 'myalgia', 'back pain'],
  Neurologic: ['headache', 'seizure', 'weakness', 'sensory change', 'gait disturbance'],
  Skin: ['rash', 'pruritus', 'skin lesion'],
  Psychiatric: ['depressed mood', 'anxiety', 'insomnia'],
};

// 초기 ROS state 생성 - 모든 항목 '-'로 시작
const buildInitialROS = () => {
  const result = {};
  Object.entries(DEFAULT_ROS).forEach(([system, symptoms]) => {
    result[system] = symptoms.map(s => ({ name: s, status: '-' }));
  });
  return result;
};

// PMHx 흔한 질환
const PMHX_COMMON = ['HTN', 'DM', 'Dyslipidemia', 'TB', 'Hepatitis', 'Cancer', 'CVA', 'CAD', 'CKD', 'Asthma', 'COPD', 'Thyroid disease'];
const buildInitialPMHxConditions = () => PMHX_COMMON.map(name => ({ name, status: '-', note: '' }));

// FHx 흔한 질환
const FHX_COMMON = ['HTN', 'DM', 'Cancer', 'CVA', 'CAD', 'TB', 'Hepatitis', 'Sudden death'];
const buildInitialFHxConditions = () => FHX_COMMON.map(name => ({ name, status: '-', note: '' }));

const DEFAULT_PE = {
  'Vital Signs': 'BP /  mmHg, HR  /min, RR  /min, BT  ℃, SpO2  %',
  General: 'Alert, acute ill-looking appearance, well-nourished',
  HEENT: 'Normocephalic, no conjunctival pallor, no scleral icterus, no LN enlargement',
  Neck: 'Supple, no JVD, no thyromegaly, no carotid bruit',
  Chest: 'Symmetric expansion, clear breath sounds, no rale, no wheezing',
  Heart: 'Regular heart beat without murmur',
  Abdomen: 'Soft and flat, normoactive bowel sound, no tenderness, no rebound tenderness, no organomegaly',
  Back: 'No CVA tenderness',
  Extremities: 'No pitting edema, no clubbing, no cyanosis',
  Neurologic: 'Alert, oriented x3, no focal neurologic deficit',
};

const INITIAL_PATIENT_INFO = {
  name: '', age: '', sex: '', chartNo: '',
  date: new Date().toISOString().split('T')[0], ward: '',
};

const INITIAL_CHART = {
  patientInfo: { ...INITIAL_PATIENT_INFO },
  cc: '', pi: '',
  pmhx: {
    conditions: buildInitialPMHxConditions(),
    history: '',     // 추가 자유 기술
    medication: '',
    surgery: '',
  },
  shx: {
    smoking: { status: '-', amount: '', duration: '', quitYears: '' },  // status: '-' 비흡연 / '+' 흡연 / 'ex' 과거
    alcohol: { status: '-', amount: '', duration: '' },
    other: '',  // 직업, 거주환경 등
  },
  fhx: {
    conditions: buildInitialFHxConditions(),
    other: '',
  },
  ros: buildInitialROS(),
  pe: { ...DEFAULT_PE },
  assessment: '',
  plan: { workup: '', treatment: '', education: '' },
};

const SectionHeader = ({ title, sectionKey, children, onAdd, collapsed, toggleCollapse }) => (
  <div className="border-b border-slate-200">
    <div className="flex items-center justify-between bg-slate-50 px-4 py-2">
      <button onClick={() => toggleCollapse(sectionKey)} className="flex items-center gap-2 text-left flex-1">
        {collapsed[sectionKey] ? <ChevronRight size={16} className="text-slate-500" /> : <ChevronDown size={16} className="text-slate-500" />}
        <span className="font-semibold text-slate-700 text-sm tracking-wide uppercase">{title}</span>
      </button>
      {onAdd && !collapsed[sectionKey] && (
        <button onClick={onAdd} className="text-xs text-teal-700 hover:text-teal-900 flex items-center gap-1 px-2 py-1 rounded hover:bg-teal-50">
          <Plus size={14} /> 항목 추가
        </button>
      )}
    </div>
    {!collapsed[sectionKey] && <div className="p-4">{children}</div>}
  </div>
);

// 상태 토글 버튼 (- → + → (none) → -)
const StatusToggle = ({ status, onClick }) => {
  const styles = {
    '-': 'bg-slate-100 text-slate-600 border-slate-300',
    '+': 'bg-red-100 text-red-700 border-red-400 font-bold',
    null: 'bg-white text-slate-300 border-slate-200',
  };
  const label = status === null ? '·' : status;
  return (
    <button onClick={onClick}
      className={`w-7 h-7 rounded border-2 text-sm flex items-center justify-center transition ${styles[status] || styles[null]}`}
      title="클릭: -/+/제외 순환">
      {label}
    </button>
  );
};

// 흡연/음주용 3-state (− / + / ex)
const TriStatusToggle = ({ status, onClick, withEx = true }) => {
  const styles = {
    '-': 'bg-slate-100 text-slate-600 border-slate-300',
    '+': 'bg-red-100 text-red-700 border-red-400 font-bold',
    'ex': 'bg-amber-100 text-amber-700 border-amber-400 font-semibold',
  };
  const label = status === 'ex' ? 'ex' : status;
  return (
    <button onClick={onClick}
      className={`min-w-[2.5rem] h-7 px-2 rounded border-2 text-xs flex items-center justify-center transition ${styles[status] || styles['-']}`}>
      {label}
    </button>
  );
};

function EMRChart() {
  const [chart, setChart] = useState(() => ({
    patientInfo: { ...INITIAL_PATIENT_INFO },
    cc: '', pi: '',
    pmhx: { conditions: buildInitialPMHxConditions(), history: '', medication: '', surgery: '' },
    shx: {
      smoking: { status: '-', amount: '', duration: '', quitYears: '' },
      alcohol: { status: '-', amount: '', duration: '' },
      other: '',
    },
    fhx: { conditions: buildInitialFHxConditions(), other: '' },
    ros: buildInitialROS(),
    pe: { ...DEFAULT_PE },
    assessment: '',
    plan: { workup: '', treatment: '', education: '' },
  }));
  const [savedCharts, setSavedCharts] = useState([]);
  const [showSaved, setShowSaved] = useState(false);
  const [toast, setToast] = useState('');
  const [collapsed, setCollapsed] = useState({});
  const [currentChartId, setCurrentChartId] = useState(null);
  const [debugInfo, setDebugInfo] = useState('');
  const [pendingDelete, setPendingDelete] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => { loadSavedCharts(); }, []);

  const loadSavedCharts = () => {
    try {
      const charts = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('chart:')) {
          try {
            const value = JSON.parse(localStorage.getItem(key));
            charts.push({ id: key, ...value });
          } catch {}
        }
      }
      setSavedCharts(charts.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0)));
    } catch (e) { console.log('localStorage 접근 실패:', e); }
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 2000);
  };

  const toggleCollapse = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));
  const updatePatientInfo = (field, value) => setChart(prev => ({ ...prev, patientInfo: { ...prev.patientInfo, [field]: value } }));
  const updateField = (field, value) => setChart(prev => ({ ...prev, [field]: value }));
  const updateNestedField = (parent, field, value) => setChart(prev => ({ ...prev, [parent]: { ...prev[parent], [field]: value } }));
  const updateSystemField = (parent, system, value) => setChart(prev => ({ ...prev, [parent]: { ...prev[parent], [system]: value } }));

  // Condition 항목 토글 (+/-/null 순환) - PMHx, FHx
  const cycleConditionStatus = (section, idx) => {
    setChart(prev => {
      const conds = [...prev[section].conditions];
      const order = ['-', '+', null];
      const cur = conds[idx].status;
      const nextIdx = (order.indexOf(cur) + 1) % order.length;
      conds[idx] = { ...conds[idx], status: order[nextIdx] };
      return { ...prev, [section]: { ...prev[section], conditions: conds } };
    });
  };

  // Condition note 변경
  const updateConditionNote = (section, idx, note) => {
    setChart(prev => {
      const conds = [...prev[section].conditions];
      conds[idx] = { ...conds[idx], note };
      return { ...prev, [section]: { ...prev[section], conditions: conds } };
    });
  };

  // Condition 추가
  const addCondition = (section) => {
    const name = prompt('질환명을 입력하세요');
    if (name && name.trim()) {
      setChart(prev => ({
        ...prev,
        [section]: { ...prev[section], conditions: [...prev[section].conditions, { name: name.trim(), status: '+', note: '' }] }
      }));
    }
  };

  // Condition 삭제
  const removeCondition = (section, idx) => {
    setChart(prev => {
      const conds = prev[section].conditions.filter((_, i) => i !== idx);
      return { ...prev, [section]: { ...prev[section], conditions: conds } };
    });
  };

  // ROS 증상 토글 (+/-/null 순환)
  const cycleROSStatus = (system, idx) => {
    setChart(prev => {
      const symptoms = [...prev.ros[system]];
      const order = ['-', '+', null];
      const cur = symptoms[idx].status;
      const nextIdx = (order.indexOf(cur) + 1) % order.length;
      symptoms[idx] = { ...symptoms[idx], status: order[nextIdx] };
      return { ...prev, ros: { ...prev.ros, [system]: symptoms } };
    });
  };

  // ROS 증상 추가/삭제
  const addROSSymptom = (system) => {
    const name = prompt('증상명을 입력하세요');
    if (name && name.trim()) {
      setChart(prev => ({
        ...prev,
        ros: { ...prev.ros, [system]: [...(prev.ros[system] || []), { name: name.trim(), status: '+' }] }
      }));
    }
  };
  const removeROSSymptom = (system, idx) => {
    setChart(prev => ({
      ...prev,
      ros: { ...prev.ros, [system]: prev.ros[system].filter((_, i) => i !== idx) }
    }));
  };

  // ROS 시스템 추가
  const addROSSystem = () => {
    const name = prompt('시스템명을 입력하세요');
    if (name && name.trim() && !chart.ros[name.trim()]) {
      setChart(prev => ({ ...prev, ros: { ...prev.ros, [name.trim()]: [] } }));
    }
  };

  // SHx update
  const updateShx = (key, field, value) => {
    setChart(prev => ({
      ...prev,
      shx: { ...prev.shx, [key]: typeof prev.shx[key] === 'object' ? { ...prev.shx[key], [field]: value } : value }
    }));
  };
  const updateShxOther = (value) => setChart(prev => ({ ...prev, shx: { ...prev.shx, other: value } }));
  const updateFhxOther = (value) => setChart(prev => ({ ...prev, fhx: { ...prev.fhx, other: value } }));

  const removeSystemField = (parent, system) => {
    setChart(prev => {
      const updated = { ...prev[parent] };
      delete updated[system];
      return { ...prev, [parent]: updated };
    });
  };

  const addSystemField = (parent) => {
    const name = prompt('항목명을 입력하세요 (예: Endocrine)');
    if (name && name.trim()) setChart(prev => ({ ...prev, [parent]: { ...prev[parent], [name.trim()]: '' } }));
  };

  const generateText = () => {
    const p = chart.patientInfo;
    const lines = [];
    if (p.name || p.age || p.sex || p.chartNo) {
      lines.push(`[Patient] ${p.name || '-'} / ${p.age || '-'}/${p.sex || '-'} / Chart No. ${p.chartNo || '-'}`);
      if (p.ward) lines.push(`[Ward] ${p.ward}`);
      if (p.date) lines.push(`[Date] ${p.date}`);
      lines.push('');
    }
    if (chart.cc) lines.push(`CC) ${chart.cc}`, '');
    if (chart.pi) lines.push(`PI) ${chart.pi}`, '');

    // PMHx
    const pmhxParts = [];
    const condStr = chart.pmhx.conditions
      .filter(c => c.status === '+' || c.status === '-')
      .map(c => {
        const base = `${c.name}(${c.status})`;
        return c.note ? `${base} ${c.note}` : base;
      })
      .join(', ');
    if (condStr) pmhxParts.push(`  - 병력: ${condStr}${chart.pmhx.history ? ', ' + chart.pmhx.history : ''}`);
    else if (chart.pmhx.history) pmhxParts.push(`  - 병력: ${chart.pmhx.history}`);
    if (chart.pmhx.medication) pmhxParts.push(`  - 약물력: ${chart.pmhx.medication}`);
    if (chart.pmhx.surgery) pmhxParts.push(`  - 수술력: ${chart.pmhx.surgery}`);
    if (pmhxParts.length > 0) {
      lines.push('PMHx)', ...pmhxParts, '');
    }

    // SHx
    const shxParts = [];
    const smk = chart.shx.smoking;
    if (smk.status === '+') {
      let s = `Smoking(+)`;
      const detail = [smk.amount, smk.duration].filter(Boolean).join(' x ');
      if (detail) s += ` ${detail}`;
      shxParts.push(s);
    } else if (smk.status === 'ex') {
      let s = `Smoking(ex-smoker)`;
      const detail = [smk.amount, smk.duration].filter(Boolean).join(' x ');
      if (detail) s += ` ${detail}`;
      if (smk.quitYears) s += `, quit ${smk.quitYears} years ago`;
      shxParts.push(s);
    } else {
      shxParts.push('Smoking(-)');
    }
    const alc = chart.shx.alcohol;
    if (alc.status === '+') {
      let s = `Alcohol(+)`;
      const detail = [alc.amount, alc.duration].filter(Boolean).join(' x ');
      if (detail) s += ` ${detail}`;
      shxParts.push(s);
    } else if (alc.status === 'ex') {
      shxParts.push('Alcohol(ex-drinker)');
    } else {
      shxParts.push('Alcohol(-)');
    }
    if (chart.shx.other) shxParts.push(chart.shx.other);
    lines.push(`SHx) ${shxParts.join(', ')}`, '');

    // FHx
    const fhxCondStr = chart.fhx.conditions
      .filter(c => c.status === '+' || c.status === '-')
      .map(c => {
        const base = `${c.name}(${c.status})`;
        return c.note ? `${base} ${c.note}` : base;
      })
      .join(', ');
    if (fhxCondStr || chart.fhx.other) {
      const parts = [fhxCondStr, chart.fhx.other].filter(Boolean).join(', ');
      lines.push(`FHx) ${parts}`, '');
    }

    // ROS
    const rosLines = [];
    Object.entries(chart.ros).forEach(([system, symptoms]) => {
      if (!Array.isArray(symptoms) || symptoms.length === 0) return;
      const str = symptoms
        .filter(s => s.status === '+' || s.status === '-')
        .map(s => `${s.name}(${s.status})`)
        .join(', ');
      if (str) rosLines.push(`  - ${system}: ${str}`);
    });
    if (rosLines.length > 0) {
      lines.push('ROS)', ...rosLines, '');
    }

    // PE
    const peEntries = Object.entries(chart.pe).filter(([_, v]) => v.trim());
    if (peEntries.length > 0) {
      lines.push('PE)');
      peEntries.forEach(([k, v]) => lines.push(`  - ${k}: ${v}`));
      lines.push('');
    }
    if (chart.assessment) lines.push(`Assessment)`, chart.assessment, '');
    if (chart.plan.workup || chart.plan.treatment || chart.plan.education) {
      lines.push('Plan)');
      if (chart.plan.workup) lines.push(`  - 추가검사: ${chart.plan.workup}`);
      if (chart.plan.treatment) lines.push(`  - 치료 및 처치: ${chart.plan.treatment}`);
      if (chart.plan.education) lines.push(`  - 환자교육: ${chart.plan.education}`);
    }
    return lines.join('\n');
  };

  const handleCopy = async () => {
    const text = generateText();
    try {
      await navigator.clipboard.writeText(text);
      showToast('복사 완료');
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('복사 완료');
    }
  };

  const handleSave = () => {
    const p = chart.patientInfo;
    const label = `${p.name || '미상'} (${p.chartNo || '-'}) - ${p.date}`;
    const id = currentChartId || `chart:${Date.now()}`;
    const data = { ...chart, label, savedAt: Date.now() };
    try {
      localStorage.setItem(id, JSON.stringify(data));
      setCurrentChartId(id);
      loadSavedCharts();
      showToast('저장 완료');
    } catch (e) {
      console.error(e);
      setDebugInfo(`저장 실패: ${e.message || e}`);
    }
  };

  const handleLoad = (id) => {
    try {
      const raw = localStorage.getItem(id);
      if (raw) {
        const data = JSON.parse(raw);
        const { label, savedAt, ...chartData } = data;
        // 옛 형식 마이그레이션
        const migrated = { ...chartData };
        // PMHx
        if (!migrated.pmhx?.conditions) {
          migrated.pmhx = {
            conditions: buildInitialPMHxConditions(),
            history: chartData.pmhx?.history || '',
            medication: chartData.pmhx?.medication || '',
            surgery: chartData.pmhx?.surgery || '',
          };
        }
        // SHx
        if (typeof migrated.shx === 'string') {
          migrated.shx = {
            smoking: { status: '-', amount: '', duration: '', quitYears: '' },
            alcohol: { status: '-', amount: '', duration: '' },
            other: chartData.shx,
          };

        // FHx
        if (typeof migrated.fhx === 'string') {
          migrated.fhx = { conditions: buildInitialFHxConditions(), other: chartData.fhx };

          migrated.fhx = { conditions: buildInitialFHxConditions(), other: '' };

        // ROS - 옛날엔 string, 지금은 array
        if (migrated.ros && typeof Object.values(migrated.ros)[0] === 'string') {

        setChart(migrated);
        setCurrentChartId(id);
        setShowSaved(false);
        showToast('불러오기 완료');

          setChart(data);
          setCurrentChartId(null);
          showToast('파일에서 불러옴');

            <div className="space-y-3">
              {[
                { key: 'workup', label: '추가검사', placeholder: 'ECG, Cardiac enzyme...' },
                { key: 'treatment', label: '치료 및 처치', placeholder: 'O2 supply, NTG SL...' },
                { key: 'education', label: '환자교육', placeholder: '금연, 식이조절...' },
              ].map(({ key, label, placeholder }) => (
                <div key={key}>
                  <label className="text-xs text-slate-500 font-medium block mb-1">{label}</label>
                  <textarea value={chart.plan[key]} onChange={e => updateNestedField('plan', key, e.target.value)}
                    placeholder={placeholder} rows={3}
                    className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:border-teal-600 resize-y" />
                </div>
              ))}
            </div>
          </SectionHeader>
        </div>

        <div className="mt-4 bg-white rounded shadow-sm border border-slate-200">
          <div className="px-4 py-2 bg-slate-50 border-b border-slate-200 flex items-center justify-between flex-wrap gap-2">
            <span className="font-semibold text-slate-700 text-sm tracking-wide uppercase">Output Preview</span>
            <div className="flex items-center gap-1">
              <button onClick={handleCopy} className="flex items-center gap-1 px-3 py-1.5 text-sm bg-teal-700 text-white hover:bg-teal-800 rounded">
                <Copy size={14} /> 복사
              </button>
              <button onClick={handlePDF} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-slate-300 text-slate-700 hover:bg-slate-50 rounded">
                <Download size={14} /> PDF
              </button>
              <button onClick={handleWord} className="flex items-center gap-1 px-3 py-1.5 text-sm border border-slate-300 text-slate-700 hover:bg-slate-50 rounded">
                <Download size={14} /> Word
              </button>
            </div>
          </div>
          <pre className="p-4 text-sm text-slate-800 whitespace-pre-wrap font-mono leading-relaxed bg-slate-50/30 max-h-96 overflow-y-auto">
            {generateText() || <span className="text-slate-400">작성 내용이 여기에 표시됩니다.</span>}
          </pre>
        </div>

        <div className="text-center text-xs text-slate-400 mt-6 pb-4">
          데이터는 브라우저에 저장됩니다. 환자 식별 정보 입력 시 보안에 유의하세요.
        </div>
      </div>

      {pendingDelete && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={cancelDelete}>
          <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-5" onClick={e => e.stopPropagation()}>
            <h3 className="font-semibold text-slate-800 mb-2">차트 삭제</h3>
            <p className="text-sm text-slate-600 mb-4">정말 이 차트를 삭제할까요?</p>
            <div className="flex justify-end gap-2">
              <button onClick={cancelDelete} className="px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 rounded">취소</button>
              <button onClick={confirmDelete} className="px-4 py-2 text-sm bg-red-600 text-white hover:bg-red-700 rounded">삭제</button>
            </div>
          </div>
        </div>
      )}

      {debugInfo && (
        <div className="fixed bottom-20 left-4 right-4 bg-yellow-50 border-2 border-yellow-400 rounded p-3 shadow-lg z-50 max-w-2xl mx-auto">
          <div className="flex justify-between items-start mb-2">
            <span className="font-bold text-sm text-yellow-900">DEBUG</span>
            <button onClick={() => setDebugInfo('')} className="text-yellow-900"><X size={16} /></button>
          </div>
          <pre className="text-xs text-slate-800 whitespace-pre-wrap font-mono">{debugInfo}</pre>
        </div>
      )}

      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded shadow-lg flex items-center gap-2 text-sm z-50">
          <Check size={16} className="text-teal-400" /> {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<EMRChart />);

// PWA: Service worker 등록
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW 등록 실패:', err));
  });
}
  </script>
</body>
</html>
